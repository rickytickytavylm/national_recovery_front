<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>Нет сети — НСВ</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .offline {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px calc(40px + env(safe-area-inset-bottom, 0px));
      background: var(--bg-gradient-teal, linear-gradient(180deg, #083a36, #0a3f3a));
      color: #fff;
      text-align: center;
    }
    .offline__card {
      max-width: 420px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 36px 28px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .offline__icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      object-fit: cover;
      margin: 0 auto 20px;
      display: block;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
    }
    .offline h1 { font-size: 26px; margin-bottom: 12px; }
    .offline p { color: rgba(255, 255, 255, 0.88); line-height: 1.5; margin-bottom: 24px; }
    .offline .btn--hero-light { margin-top: 4px; }
  </style>
</head>
<body>
  <main class="offline">
    <div class="offline__card">
      <img src="material-first-30-days.webp" class="offline__icon" alt="" width="72" height="72" />
      <h1>Нет подключения</h1>
      <p>Часть материалов и страниц доступна офлайн. Проверьте интернет и попробуйте снова.</p>
      <a href="index.html" class="btn btn--hero-light">На главную</a>
    </div>
  </main>
</body>
</html>
