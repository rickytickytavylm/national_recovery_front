<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>Нет сети — НСВ · Центры</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .offline {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      background: #f5f5f7;
      text-align: center;
    }
    .offline__card {
      max-width: 420px;
      background: #fff;
      border: 1px solid #e6e6e9;
      border-radius: 24px;
      padding: 36px 28px;
      box-shadow: 0 12px 40px rgba(17, 17, 19, 0.06);
    }
    .offline__icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      object-fit: cover;
      margin: 0 auto 20px;
      display: block;
    }
    .offline h1 { font-size: 26px; margin-bottom: 12px; }
    .offline p { color: #6e6e73; line-height: 1.5; margin-bottom: 24px; }
  </style>
</head>
<body>
  <main class="offline">
    <div class="offline__card">
      <img src="material-first-30-days.webp" class="offline__icon" alt="" width="72" height="72" />
      <h1>Нет подключения</h1>
      <p>Кабинет недоступен без интернета. Проверьте сеть и откройте страницу снова.</p>
      <a href="dashboard.html" class="btn btn--primary">В кабинет</a>
    </div>
  </main>
</body>
</html>
