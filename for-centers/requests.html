<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Заявки центра: единая воронка обращений с фильтрами по статусу и источнику." />
  <title>Заявки — Национальная система восстановления</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0f766e" />
  <link rel="icon" href="material-first-30-days.webp" type="image/webp" sizes="192x192" />
  <link rel="apple-touch-icon" href="material-first-30-days.webp" sizes="180x180" />
  <link rel="manifest" href="site.webmanifest" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="НСВ · Центры" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="app__side">
      <a href="index.html" class="app__brand">
        <span class="brand__mark" aria-hidden="true"></span>
        <span>Центр «Ясность»</span>
      </a>
      <nav class="app__nav" aria-label="Кабинет">
        <a href="dashboard.html"><span class="di" data-di="grid"></span>Обзор</a>
        <a href="requests.html" class="is-active"><span class="di" data-di="inbox"></span>Заявки</a>
        <a href="association.html"><span class="di" data-di="users"></span>Ассоциация</a>
        <a href="programs.html"><span class="di" data-di="program"></span>Программы</a>
        <a href="analytics.html"><span class="di" data-di="chart"></span>Аналитика</a>
        <a href="profile.html"><span class="di" data-di="shield"></span>Профиль</a>
      </nav>
      <div class="app__side-foot">
        <div class="app__status"><span class="dot"></span> Центр подтверждён</div>
        <a href="index.html" class="nav__link" style="font-size:13px">← На главную сайта</a>
      </div>
    </aside>

    <main class="app__main">
      <div class="app__topbar">
        <div>
          <span class="app__topbar-eyebrow">Кабинет</span>
          <h1>Заявки</h1>
        </div>
        <div class="app__topbar-actions">
          <a href="dashboard.html" class="btn btn--ghost btn--sm">Обзор</a>
          <span class="avatar" aria-hidden="true">АП</span>
        </div>
      </div>

      <div class="kpis">
        <div class="kpi"><span class="kpi__label">Всего заявок</span><span class="kpi__value" id="kpiTotal">0</span><span class="kpi__trend">за месяц</span></div>
        <div class="kpi"><span class="kpi__label">Новые</span><span class="kpi__value" id="kpiNew">0</span><span class="kpi__trend up">требуют ответа</span></div>
        <div class="kpi"><span class="kpi__label">В работе</span><span class="kpi__value" id="kpiWork">0</span><span class="kpi__trend">в процессе</span></div>
        <div class="kpi"><span class="kpi__label">Принято</span><span class="kpi__value" id="kpiDone">0</span><span class="kpi__trend up">в программе</span></div>
      </div>

      <div class="filters">
        <label class="search">
          <span class="search__icon" aria-hidden="true"></span>
          <input type="search" id="searchInput" placeholder="Поиск по номеру или источнику" aria-label="Поиск заявок" />
        </label>
        <div class="chip-group" id="statusFilter" role="group" aria-label="Статус">
          <button class="chip-btn is-active" data-status="all">Все</button>
          <button class="chip-btn" data-status="new">Новые</button>
          <button class="chip-btn" data-status="assigned">Назначены</button>
          <button class="chip-btn" data-status="in_progress">В работе</button>
          <button class="chip-btn" data-status="completed">Завершены</button>
          <button class="chip-btn" data-status="cancelled">Отменены</button>
        </div>
      </div>

      <p class="results-count" id="resultsCount"></p>

      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr><th>Заявка</th><th>Источник</th><th>Программа</th><th>Дата</th><th>Статус</th><th></th></tr>
          </thead>
          <tbody id="requestsBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="shared/config.js"></script>
  <script src="shared/constants.js"></script>
  <script src="shared/api.js"></script>
  <script src="shared/routes.js"></script>
  <script src="app.js"></script>
  <script src="requests.js"></script>
</body>
</html>
